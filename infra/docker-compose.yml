# Argus enterprise stack
#
# Self-contained docker-compose stack that replaces Faker mocks with real
# backed services so the agent can hit genuine RBAC, persistence, and
# failure surfaces (see findings/F09).
#
# All services bind to 127.0.0.1 only — no LAN exposure.
# Reset state with `make reset` (drops all named volumes).

name: stac-harness

networks:
  stac-net:
    driver: bridge

volumes:
  keycloak-data:
  postgres-data:
  gitea-data:
  minio-data:
  mailpit-data:
  opensearch-data:

services:
  # ----------------------------------------------------------------------
  # Keycloak — identity + RBAC
  # ----------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: stac-keycloak
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-file
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: localhost
      JAVA_OPTS_APPEND: "-Xms256m -Xmx768m"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak:/opt/keycloak/data/import:ro
    networks:
      - stac-net
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      # Keycloak 26 ships only essential binaries; use the bundled JVM
      # to probe its own management endpoint.
      test:
        - CMD-SHELL
        - >
          exec 3<>/dev/tcp/127.0.0.1/9000;
          printf 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3;
          grep -q 'UP' <&3
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # PostgreSQL — asset / audit DB
  # ----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: stac-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stac_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-enterprise}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - stac-net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stac} -d ${POSTGRES_DB:-enterprise}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # Gitea — self-hosted Git, swaps in for GitHub
  # ----------------------------------------------------------------------
  gitea:
    image: gitea/gitea:1.22
    container_name: stac-gitea
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__DOMAIN: gitea
      GITEA__server__ROOT_URL: http://localhost:3000/
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "false"
      GITEA__log__LEVEL: warn
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:2222:22"
    volumes:
      - gitea-data:/data
      - ./gitea:/opt/setup:ro
    networks:
      - stac-net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # ----------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: stac-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-stac_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-stac_minio_dev_pw}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - stac-net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # MinIO bucket bootstrap — runs once and exits
  # ----------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: stac-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-stac_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-stac_minio_dev_pw}
    networks:
      - stac-net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/exports &&
      mc mb --ignore-existing local/pii-data &&
      mc mb --ignore-existing local/audit-archive &&
      mc anonymous set none local/pii-data &&
      echo 'minio bootstrap complete'
      "
    restart: "no"

  # ----------------------------------------------------------------------
  # Mailpit — captures all outgoing SMTP for inspection
  # ----------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: stac-mailpit
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    volumes:
      - mailpit-data:/data
    networks:
      - stac-net
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/readyz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------------------
  # OpenSearch — single-node SIEM-style log aggregation
  # ----------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: stac-opensearch
    environment:
      cluster.name: stac-cluster
      node.name: stac-node
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms2g -Xmx2g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - stac-net
    deploy:
      resources:
        limits:
          memory: 3072M
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
